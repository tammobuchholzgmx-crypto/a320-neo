<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A320neo Checkliste · MSFS 2024</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================
     A320neo CHECKLISTE — MSFS 2024
     Design: Cockpit-Industrial Dark Theme
     Farben, Fonts und Layout hier anpassbar
  ============================================ */

  /* --- FARBEN (hier anpassen) --- */
  :root {
    --bg-base:        #0d0f12;
    --bg-panel:       #12161b;
    --bg-card:        #181d24;
    --bg-hover:       #1e242d;
    --accent-green:   #00e5a0;
    --accent-amber:   #f0a500;
    --accent-blue:    #4db8ff;
    --accent-red:     #ff5555;
    --text-primary:   #e8ecf0;
    --text-secondary: #7a8694;
    --text-muted:     #3d4855;
    --border:         #232b35;
    --border-bright:  #2e3a47;
    --phase-1-color:  #4db8ff;
    --phase-2-color:  #f0a500;
    --phase-3-color:  #00e5a0;
    --phase-4-color:  #ff5555;
    --phase-5-color:  #00e5a0;
    --phase-6-color:  #9f7aea;
    --phase-7-color:  #4db8ff;
    --phase-8-color:  #00e5a0;
    --phase-9-color:  #f0a500;
    --phase-10-color: #ff5555;
    --phase-11-color: #00e5a0;
  }

  /* --- RESET & BASE --- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* --- SCANLINE OVERLAY (atmosphärisch, deaktivierbar) --- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* --- LAYOUT --- */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* --- HEADER --- */
  .header {
    border-bottom: 1px solid var(--border-bright);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .logo-block {}
  .logo-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent-green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .logo-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .logo-title span { color: var(--accent-blue); }
  .logo-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 300;
  }

  /* --- CONTROLS --- */
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent-green); color: var(--accent-green); background: rgba(0,229,160,0.05); }
  .btn-reset:hover { border-color: var(--accent-red); color: var(--accent-red); background: rgba(255,85,85,0.05); }

  /* --- STATS BAR --- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
  }
  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
  }
  .stat-val.green { color: var(--accent-green); }

  /* --- PROGRESS BAR --- */
  .progress-wrap { margin-bottom: 1.75rem; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .progress-track {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* --- PHASE CARDS --- */
  .phase {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .phase:hover { border-color: var(--border-bright); }
  .phase.complete { border-color: rgba(0,229,160,0.2); }

  .phase-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    background: var(--bg-panel);
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }
  .phase-header:hover { background: var(--bg-hover); }

  .phase-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

  /* Farbige Phasen-Nummer */
  .phase-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    width: 26px;
    height: 26px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .phase-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .phase-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

  .phase-progress-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 36px;
    text-align: right;
  }
  .phase.complete .phase-progress-text { color: var(--accent-green); }

  .phase-mini-bar {
    width: 60px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .phase-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .phase-chevron {
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .phase-chevron.open { transform: rotate(90deg); }

  /* --- PHASE BODY --- */
  .phase-body { display: none; background: var(--bg-card); }
  .phase-body.open { display: block; }

  /* --- SECTION DIVIDERS --- */
  .section-divider {
    padding: 10px 16px 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
  }
  .section-divider:first-child { border-top: none; }

  /* --- CHECKLIST ITEMS --- */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-top: 1px solid transparent;
  }
  .item:hover { background: var(--bg-hover); }
  .item.done .item-label { text-decoration: line-through; color: var(--text-muted); }
  .item.done { opacity: 0.6; }

  /* Checkbox */
  .checkbox {
    width: 17px;
    height: 17px;
    min-width: 17px;
    border: 1px solid var(--border-bright);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .item:hover .checkbox { border-color: var(--text-secondary); }
  .item.done .checkbox {
    background: var(--accent-green);
    border-color: var(--accent-green);
  }
  .checkmark {
    display: none;
    color: #0d0f12;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
  }
  .item.done .checkmark { display: block; }

  .item-content { flex: 1; min-width: 0; }
  .item-label {
    font-size: 13.5px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .item-note {
    font-size: 11.5px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-weight: 300;
  }

  /* Licht Badge */
  .light-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 2px;
    margin-left: 8px;
    background: rgba(240,165,0,0.12);
    color: var(--accent-amber);
    border: 1px solid rgba(240,165,0,0.2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    vertical-align: middle;
  }
  .light-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent-amber);
    flex-shrink: 0;
  }

  /* --- FOOTER --- */
  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 500px) {
    .logo-title { font-size: 24px; }
    .phase-mini-bar { display: none; }
    .phase-name { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="logo-block">
        <div class="logo-tag">MSFS 2024 · Normal Operations</div>
        <div class="logo-title">A320<span>neo</span> Checkliste</div>
        <div class="logo-sub">Airbus A320neo v2 · Microsoft Flight Simulator 2024</div>
      </div>
      <div class="controls">
        <button class="btn btn-reset" onclick="resetAll()">Reset</button>
        <button class="btn" onclick="expandAll()">Alle öffnen</button>
        <button class="btn" onclick="collapseAll()">Alle schließen</button>
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Gesamt</div>
      <div class="stat-val" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Erledigt</div>
      <div class="stat-val green" id="stat-done">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Offen</div>
      <div class="stat-val" id="stat-open">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Fortschritt</div>
      <div class="stat-val" id="stat-pct">0%</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Gesamtfortschritt</span>
      <span id="prog-label">0 / 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
  </div>

  <!-- PHASES CONTAINER -->
  <div id="phases"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-text">A320NEO · MSFS 2024 · NORMAL OPERATIONS CHECKLIST</div>
    <div class="footer-text" id="footer-time"></div>
  </footer>

</div>

    items: [
      {s:"After Landing",       label:"Strobe Lights — OFF",            light:true},
      {s:"After Landing",       label:"Landing Lights — OFF",           light:true},
      {s:"After Landing",       label:"Taxi Light — ON",                light:true},
      {s:"After Landing",       label:"Nose Light → Taxi",              light:true},
      {s:"After Landing",       label:"Spoiler — DISARM"},
      {s:"After Landing",       label:"Flaps — 0 einfahren"},
      {s:"After Landing",       label:"Transponder — STBY oder OFF"},
      {s:"After Landing",       label:"APU Master — ON · APU Start",    note:"APU für Strom beim Shutdown"},
      {s:"After Landing",       label:"APU Bleed — ON"},
      {s:"Parking & Shutdown",  label:"Parking Brake — SET"},
      {s:"Parking & Shutdown",  label:"Taxi Light — OFF",               light:true},
      {s:"Parking & Shutdown",  label:"Engine 1 — OFF"},
      {s:"Parking & Shutdown",  label:"Engine 2 — OFF"},
      {s:"Parking & Shutdown",  label:"Seatbelt Sign — OFF"},
      {s:"Parking & Shutdown",  label:"Beacon — OFF",                   note:"Nur wenn beide Triebwerke aus", light:true},
      {s:"Parking & Shutdown",  label:"External Power anschließen (optional)"},
      {s:"Parking & Shutdown",  label:"Avionik ausschalten"},
      {s:"Parking & Shutdown",  label:"APU — OFF (nach ~5 Min. Abkühlung)"},
      {s:"Parking & Shutdown",  label:"Batterie 1 & 2 — OFF"},
    ]
  },
];

/* ============================================
   STATE & RENDERING
============================================ */
const openPhases = new Set();
const checked = new Set();

function getColor(phase) {
  return getComputedStyle(document.documentElement).getPropertyValue(phase.colorVar).trim();
}

function buildPhase(phase, idx) {
  const color = getColor(phase);
  const total = phase.items.length;
  const done = phase.items.filter((_, i) => checked.has(phase.id + '_' + i)).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const isOpen = openPhases.has(phase.id);
  const isComplete = done === total;

  let itemsHtml = '';
  let lastSection = null;
  phase.items.forEach((item, i) => {
    const key = phase.id + '_' + i;
    const isDone = checked.has(key);
    if (item.s !== lastSection) {
      itemsHtml += `<div class="section-divider">${item.s}</div>`;
      lastSection = item.s;
    }
    const lightBadge = item.light ? `<span class="light-badge">Licht</span>` : '';
    const noteHtml = item.note ? `<div class="item-note">${item.note}</div>` : '';
    itemsHtml += `
      <div class="item${isDone ? ' done' : ''}" data-key="${key}" data-phase="${phase.id}">
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div class="item-content">
          <div class="item-label">${item.label}${lightBadge}</div>
          ${noteHtml}
        </div>
      </div>`;
  });

  const numStyle = `background:${color}22;color:${color};border:1px solid ${color}44`;
  const fillStyle = `background:${color};width:${pct}%`;

  return `
    <div class="phase${isComplete ? ' complete' : ''}" id="ph-${phase.id}">
      <div class="phase-header" data-toggle="${phase.id}">
        <div class="phase-left">
          <div class="phase-num" style="${numStyle}">${String(idx+1).padStart(2,'0')}</div>
          <div class="phase-name">${phase.title}</div>
        </div>
        <div class="phase-right">
          <div class="phase-progress-text">${done}/${total}</div>
          <div class="phase-mini-bar">
            <div class="phase-mini-fill" style="${fillStyle}"></div>
          </div>
          <svg class="phase-chevron${isOpen ? ' open' : ''}" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="phase-body${isOpen ? ' open' : ''}" id="body-${phase.id}">${itemsHtml}</div>
    </div>`;
}

function updateStats() {
  const total = PHASES.reduce((a, p) => a + p.items.length, 0);
  const done = checked.size;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-open').textContent = total - done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + total;
}

function renderAll() {
  document.getElementById('phases').innerHTML = PHASES.map((p, i) => buildPhase(p, i)).join('');
  updateStats();
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', function() {
      const id = this.dataset.toggle;
      if (openPhases.has(id)) openPhases.delete(id); else openPhases.add(id);
      renderAll();
    });
  });
  document.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const key = this.dataset.key;
      const phaseId = this.dataset.phase;
      if (checked.has(key)) checked.delete(key); else checked.add(key);
      openPhases.add(phaseId);
      renderAll();
    });
  });
}

function resetAll()    { checked.clear(); openPhases.clear(); renderAll(); }
function expandAll()   { PHASES.forEach(p => openPhases.add(p.id)); renderAll(); }
function collapseAll() { openPhases.clear(); renderAll(); }

/* Footer Zeit */
function updateTime() {
  const now = new Date();
  document.getElementById('footer-time').textContent =
    now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) + ' LT';
}
setInterval(updateTime, 1000);
updateTime();

renderAll();
</script>
</body>
</html>
